server:
  port: 8082

spring:
  application:
    name: auth-service
  
  jwt:
    secret: ${JWT_SECRET}
    expiration: 3600000 # 1 hour
  data:
    redis:
      host: redis
      port: 6379
  datasource:
    url: jdbc:postgresql://postgres:${POSTGRES_PORT:5432}/${POSTGRES_DB:msa_db}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    hibernate:
      ddl-auto: update
    show-sql: true

# 관측성 설정
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
